name: Kubesure CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar o pacote localmente
        run: pip install .

      - name: Testar a execução do Hello World
        run: |
          kubesure version
          kubesure check ./manifests
