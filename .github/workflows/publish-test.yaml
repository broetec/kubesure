name: Publish Test

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g. dev1, rc1). Use "none", empty, or "-" to publish without suffix (pyproject version as-is).'
        required: false
        default: 'dev'

jobs:
  publish-testpypi:
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Apply version suffix
        env:
          VERSION_SUFFIX: ${{ inputs.version_suffix }}
        run: |
          python << 'PY'
          import os
          import re
          from pathlib import Path

          raw = (os.environ.get("VERSION_SUFFIX") or "").strip()
          no_suffix = not raw or raw.lower() in ("none", "-", "false", "no")

          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.MULTILINE)
          if not m:
              raise SystemExit("Could not read project.version from pyproject.toml")
          base = m.group(1)

          if no_suffix:
              new_version = base
          else:
              suffix = raw
              if suffix == "dev":
                  suffix = "dev0"
              if suffix.startswith("dev"):
                  new_version = f"{base}.{suffix}"
              elif re.match(r"^(rc|a|b)\d+", suffix):
                  new_version = f"{base}{suffix}"
              else:
                  new_version = f"{base}.{suffix}"

          pyproject_new = re.sub(
              r'^version\s*=\s*"[^"]+"',
              f'version = "{new_version}"',
              pyproject,
              count=1,
              flags=re.MULTILINE,
          )
          Path("pyproject.toml").write_text(pyproject_new, encoding="utf-8")

          ver_file = Path("src/kubesure/__version__.py")
          text = ver_file.read_text(encoding="utf-8")
          ver_file.write_text(
              re.sub(
                  r"^__version__\s*=\s*'[^']+'",
                  f"__version__ = '{new_version}'",
                  text,
                  count=1,
                  flags=re.MULTILINE,
              ),
              encoding="utf-8",
          )

          print(f"Publishing as {new_version}")
          PY

      - name: Build with uv
        run: uv build

      - name: Send to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
